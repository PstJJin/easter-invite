<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부활절 행복축제 초청</title>

<meta property="og:title" content="부활절 행복축제 초청">
<meta property="og:description" content="4월 5일 주일, 함께해요!">
<meta property="og:image" content="invitation.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f8f6f4;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: 0 auto;
}

img {
    width: 100%;
    display: block;
}

/* 오시는 길 */
.section {
    padding: 20px 10px;
}

/* 지도 */
.map {
    width: 90%;
    max-width: 500px;
    border-radius: 15px;
    margin: 10px auto;
}

/* 버튼 영역 */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0 40px;
}

.button {
    padding: 15px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 15px;
    width: 40%;
    max-width: 160px;
    text-align: center;
}

/* 버튼 색상 */
.kakao {
    background-color: #FEE500;
    color: #000;
    font-weight: bold;
}

.naver {
    background-color: #03C75A;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <img src="invitation.png" alt="초청장">
</div>

<div class="section">
    <h2>오시는 길</h2>

    <!-- 지도 카드 -->
    <div style="width:90%; max-width:500px; margin:10px auto; padding:20px; border-radius:15px; background:#ffffff; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <h3 style="margin:0;">분당제일교회</h3>
        <p style="margin:5px 0 0; font-size:14px; color:#555;">
            경기도 용인시 수지구 수지로 342번길 23
        </p>
    </div>

    <!-- 버튼 -->
<div class="buttons">
    <a class="button kakao" href="https://map.kakao.com/link/to/분당제일교회,37.3225,127.0955">
        카카오맵
    </a>

    <a class="button naver" href="nmap://route/car?dlat=37.3225&dlng=127.0955&dname=분당제일교회">
        네이버지도
    </a>
</div>
</div>

</body>
</html>
