<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부활절 행복축제 초청</title>

<!-- Open Graph for KakaoTalk preview -->
<meta property="og:title" content="부활절 행복축제 초청">

<meta property="og:image" content="invitation.png">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f8f6f4;
        text-align: center;
    }
    .container {
        position: relative;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
    }
    img {
        width: 100%;
        height: auto;
        display: block;
    }
    .button {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #6dbf73;
        color: white;
        padding: 15px 25px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-bottom: 40px;
}

.button {
    padding: 15px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 16px;
    width: 80%;
    max-width: 300px;
    text-align: center;
}

.kakao {
    background-color: #FEE500;
    color: #000;
    font-weight: bold;
}

.naver {
    background-color: #03C75A;
    color: white;
    font-weight: bold;
}
</style>
</head>

<div class="container">
    <img src="invitation.png" alt="초청장">
</div>

<h2 style="margin-top:20px;">오시는 길</h2>

<a href="https://map.kakao.com/link/map/분당제일교회,37.3225,127.0955" target="_blank">

         style="width:90%; max-width:500px; border-radius:15px;">
</a>

<div class="buttons">
    <a class="button kakao" href="https://map.kakao.com/link/to/분당제일교회,37.3225,127.0955">
        카카오맵으로 길찾기
    </a>

    <a class="button naver" href="nmap://route/car?dlat=37.3225&dlng=127.0955&dname=분당제일교회">
        네이버지도로 길찾기

</div>
