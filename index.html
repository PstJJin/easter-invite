<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부활절 행복축제 초청</title>

<meta property="og:title" content="부활절 행복축제 초청">
<meta property="og:description" content="4월 5일 주일, 함께해요!">
<meta property="og:image" content="preview2.png">
<meta property="og:url" content="https://pstjjin.github.io/easter-invite/">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f8f6f4;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: 0 auto;
}

img {
    width: 100%;
    display: block;
}

/* 오시는 길 */
.section {
    padding: 20px 10px;
}

/* 지도 */
.map {
    width: 90%;
    max-width: 500px;
    border-radius: 15px;
    margin: 10px auto;
}

/* 버튼 영역 */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0 40px;
}

.button {
    padding: 15px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 15px;
    width: 40%;
    max-width: 160px;
    text-align: center;
}

/* 버튼 색상 */
.kakao {
    background-color: #FEE500;
    color: #000;
    font-weight: bold;
}

.naver {
    background-color: #03C75A;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <img src="invitation.png" alt="초청장">
</div>

<div class="section">
<h2 style="margin-top:20px;">오시는 길</h2>

<!-- 구글 지도 -->
<div style="width:90%; max-width:500px; margin:10px auto;">
    <iframe
        src="https://www.google.com/maps?q=분당제일교회&output=embed"
        width="100%"
        height="300"
        style="border:0; border-radius:15px;"
        allowfullscreen=""
        loading="lazy">
    </iframe>
</div>

    <!-- 버튼 -->
<div class="buttons">
    <a class="button kakao" href="https://map.kakao.com/link/search/분당제일교회">
        카카오맵
    </a>

    <a class="button naver" href="https://map.naver.com/v5/search/분당제일교회">
        네이버지도
    </a>
</div>
</div>

</body>
</html>
